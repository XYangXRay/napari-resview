# For more information about tox, see https://tox.readthedocs.io/en/latest/
#
# GitHub Actions optimization: Windows testing is reduced to Python 3.11 only
# to speed up CI. Linux handles the full matrix.
[tox]
envlist = py{310,311,312,313}-{linux,macos,windows}
isolated_build=true

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313

[gh-actions:env]
PLATFORM =
    ubuntu-latest: linux
    macos-latest: macos
    windows-latest: windows

[testenv]
platform =
    macos: darwin
    linux: linux
    windows: win32
passenv =
    CI
    GITHUB_ACTIONS
    DISPLAY
    XAUTHORITY
    NUMPY_EXPERIMENTAL_ARRAY_FUNCTION
    PYVISTA_OFF_SCREEN
dependency_groups =
    dev
# Windows: use -q (quiet) instead of -v for faster I/O, skip coverage for speed
# Linux/macOS: full verbosity and coverage
commands =
    windows: pytest -q --color=yes
    linux,macos: pytest -v --color=yes --cov=napari_resview --cov-report=xml
setenv =
    PYTHONPATH = {toxinidir}/src
