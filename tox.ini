# For more information about tox, see https://tox.readthedocs.io/en/latest/
#
# Windows CI Optimizations (to avoid 30min timeout):
# - Reduced to Python 3.11 only (vs full matrix on Linux)
# - Skips coverage collection
# - Uses quiet pytest output for faster I/O
# - UV optimizations: copy mode and unsafe-best-match index strategy
# Linux handles comprehensive testing with full dependency matrix.
[tox]
envlist = py{310,311,312,313}-{linux,macos,windows}
isolated_build=true

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313

[gh-actions:env]
PLATFORM =
    ubuntu-latest: linux
    macos-latest: macos
    windows-latest: windows

[testenv]
platform =
    macos: darwin
    linux: linux
    windows: win32
passenv =
    CI
    GITHUB_ACTIONS
    DISPLAY
    XAUTHORITY
    NUMPY_EXPERIMENTAL_ARRAY_FUNCTION
    PYVISTA_OFF_SCREEN
    UV_LINK_MODE
    UV_INDEX_STRATEGY
deps =
    pytest
    pytest-cov
    pytest-qt
    napari[qt]==0.7.0
# Windows: use -q (quiet) instead of -v for faster I/O, skip coverage for speed
# Linux/macOS: full verbosity and coverage
commands =
    windows: pytest -q --color=yes --tb=short
    linux,macos: pytest -v --color=yes --cov=napari_resview --cov-report=xml
setenv =
    PYTHONPATH = {toxinidir}/src
